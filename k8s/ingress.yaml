apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aws-platform-ingress
  namespace: platform-dev
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/tags: "Project=aws-platform,Environment=dev,Owner=inaam,ManagedBy=kubernetes,CostCenter=platform-eng"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aws-platform-service
                port:
                  number: 80
